name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloud-run-main
  cancel-in-progress: true

env:
  SERVICE_NAME: compakt
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Validate required secrets
        shell: bash
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REDIRECT_URI: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          missing=()

          check() {
            local name="$1"
            local val="$2"
            if [ -z "$val" ]; then
              missing+=("$name")
            fi
          }

          check_group() {
            local group_name="$1"
            shift
            local has_any="false"
            local item

            for item in "$@"; do
              local value="${!item}"
              if [ -n "$value" ]; then
                has_any="true"
                break
              fi
            done

            if [ "$has_any" = "true" ]; then
              for item in "$@"; do
                check "$item" "${!item}"
              done
            fi
          }

          check "NEXT_PUBLIC_APP_URL" "$NEXT_PUBLIC_APP_URL"
          check "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          check "CLERK_SECRET_KEY" "$CLERK_SECRET_KEY"
          check "NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_URL"
          check "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          check "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY"
          check "GMAIL_USER" "$GMAIL_USER"
          check "GMAIL_APP_PASSWORD" "$GMAIL_APP_PASSWORD"
          check_group "SPOTIFY" "SPOTIFY_CLIENT_ID" "SPOTIFY_CLIENT_SECRET"
          check_group "GOOGLE_CALENDAR" "GOOGLE_CLIENT_ID" "GOOGLE_CLIENT_SECRET" "GOOGLE_CALENDAR_REDIRECT_URI"

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

          echo "All required secrets are present."

      - name: Deploy to Cloud Run (build from source)
        shell: bash
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REDIRECT_URI: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
        run: |
          build_env_vars=(
            "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}"
            "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
            "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            "NEXT_PUBLIC_GIT_SHA=${GITHUB_SHA}"
          )

          if [ -n "${NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET}" ]; then
            build_env_vars+=("NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET=${NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET}")
          fi

          build_env_vars_csv=$(printf '%s,' "${build_env_vars[@]}")
          build_env_vars_csv="${build_env_vars_csv%,}"

          python3 <<'PY'
          import json
          import os

          runtime_vars = {
              "NEXT_PUBLIC_APP_URL": os.environ["NEXT_PUBLIC_APP_URL"],
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY": os.environ["NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"],
              "CLERK_SECRET_KEY": os.environ["CLERK_SECRET_KEY"],
              "NEXT_PUBLIC_GIT_SHA": os.environ["GITHUB_SHA"],
              "NEXT_PUBLIC_SUPABASE_URL": os.environ["NEXT_PUBLIC_SUPABASE_URL"],
              "NEXT_PUBLIC_SUPABASE_ANON_KEY": os.environ["NEXT_PUBLIC_SUPABASE_ANON_KEY"],
              "SUPABASE_SERVICE_ROLE_KEY": os.environ["SUPABASE_SERVICE_ROLE_KEY"],
              "GMAIL_USER": os.environ["GMAIL_USER"],
              "GMAIL_APP_PASSWORD": os.environ["GMAIL_APP_PASSWORD"],
          }

          for key in [
              "NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET",
              "TWILIO_ACCOUNT_SID",
              "TWILIO_AUTH_TOKEN",
              "TWILIO_PHONE_NUMBER",
              "SPOTIFY_CLIENT_ID",
              "SPOTIFY_CLIENT_SECRET",
              "GCS_BUCKET",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "GOOGLE_CALENDAR_REDIRECT_URI",
          ]:
              value = os.environ.get(key)
              if value:
                  runtime_vars[key] = value

          with open(".cloudrun-runtime.yaml", "w", encoding="utf-8") as runtime_file:
              for key, value in runtime_vars.items():
                  runtime_file.write(f"{key}: {json.dumps(value)}\n")
          PY

          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-build-env-vars "$build_env_vars_csv" \
            --env-vars-file .cloudrun-runtime.yaml
