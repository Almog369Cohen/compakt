name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloud-run-main
  cancel-in-progress: true

env:
  SERVICE_NAME: compakt
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Validate required secrets
        shell: bash
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REDIRECT_URI: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          missing=()

          check() {
            local name="$1"
            local val="$2"
            if [ -z "$val" ]; then
              missing+=("$name")
            fi
          }

          check_group() {
            local group_name="$1"
            shift
            local has_any="false"
            local item

            for item in "$@"; do
              local value="${!item}"
              if [ -n "$value" ]; then
                has_any="true"
                break
              fi
            done

            if [ "$has_any" = "true" ]; then
              for item in "$@"; do
                check "$item" "${!item}"
              done
            fi
          }

          check "NEXT_PUBLIC_APP_URL" "$NEXT_PUBLIC_APP_URL"
          check "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          check "CLERK_SECRET_KEY" "$CLERK_SECRET_KEY"
          check "NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_URL"
          check "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          check "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY"
          check "GMAIL_USER" "$GMAIL_USER"
          check "GMAIL_APP_PASSWORD" "$GMAIL_APP_PASSWORD"
          check_group "SPOTIFY" "SPOTIFY_CLIENT_ID" "SPOTIFY_CLIENT_SECRET"
          check_group "GOOGLE_CALENDAR" "GOOGLE_CLIENT_ID" "GOOGLE_CLIENT_SECRET" "GOOGLE_CALENDAR_REDIRECT_URI"

          case "$NEXT_PUBLIC_APP_URL" in
            http://localhost:*|https://localhost:*|*=http://localhost:*|*=https://localhost:*)
              echo "::error::NEXT_PUBLIC_APP_URL points to localhost or has an invalid prefix: $NEXT_PUBLIC_APP_URL"
              exit 1
              ;;
          esac

          case "$NEXT_PUBLIC_SUPABASE_URL" in
            https://*) ;;
            *)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL must be a valid https URL. Current value looks invalid."
              exit 1
              ;;
          esac

          case "$NEXT_PUBLIC_SUPABASE_URL" in
            *localhost*|*=http://*|*=https://*)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL looks malformed: $NEXT_PUBLIC_SUPABASE_URL"
              exit 1
              ;;
          esac

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

          echo "All required secrets are present."

      - name: Build and push Docker image
        shell: bash
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${CLOUDSDK_CORE_PROJECT}/${SERVICE_NAME}/${SERVICE_NAME}:${GITHUB_SHA::8}"

          # Ensure Artifact Registry repo exists
          gcloud artifacts repositories describe "$SERVICE_NAME" \
            --location="$REGION" --format="value(name)" 2>/dev/null || \
          gcloud artifacts repositories create "$SERVICE_NAME" \
            --repository-format=docker \
            --location="$REGION" \
            --description="Compakt container images"

          # Configure docker auth
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

          # Build with Docker — NEXT_PUBLIC_* are inlined by next build,
          # CLERK_SECRET_KEY + SUPABASE_SERVICE_ROLE_KEY are needed so the
          # Clerk SDK can initialise during page-data collection (multi-stage
          # build keeps them out of the final runner image).
          docker build \
            --build-arg "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}" \
            --build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" \
            --build-arg "CLERK_SECRET_KEY=${CLERK_SECRET_KEY}" \
            --build-arg "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}" \
            --build-arg "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
            --build-arg "NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET=${NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET}" \
            --build-arg "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" \
            --build-arg "NEXT_PUBLIC_GIT_SHA=${GITHUB_SHA}" \
            -t "$IMAGE" .

          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        shell: bash
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REDIRECT_URI: ${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
        run: |
          python3 <<'PY'
          import os
          import subprocess
          import json
          import sys

          runtime_vars = {
              "NEXT_PUBLIC_APP_URL": os.environ["NEXT_PUBLIC_APP_URL"],
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY": os.environ["NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"],
              "CLERK_SECRET_KEY": os.environ["CLERK_SECRET_KEY"],
              "NEXT_PUBLIC_GIT_SHA": os.environ.get("GITHUB_SHA", ""),
              "NEXT_PUBLIC_SUPABASE_URL": os.environ["NEXT_PUBLIC_SUPABASE_URL"],
              "NEXT_PUBLIC_SUPABASE_ANON_KEY": os.environ["NEXT_PUBLIC_SUPABASE_ANON_KEY"],
              "SUPABASE_SERVICE_ROLE_KEY": os.environ["SUPABASE_SERVICE_ROLE_KEY"],
              "GMAIL_USER": os.environ["GMAIL_USER"],
              "GMAIL_APP_PASSWORD": os.environ["GMAIL_APP_PASSWORD"],
          }

          for key in [
              "NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET",
              "TWILIO_ACCOUNT_SID",
              "TWILIO_AUTH_TOKEN",
              "TWILIO_PHONE_NUMBER",
              "SPOTIFY_CLIENT_ID",
              "SPOTIFY_CLIENT_SECRET",
              "GCS_BUCKET",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "GOOGLE_CALENDAR_REDIRECT_URI",
          ]:
              value = os.environ.get(key)
              if value:
                  runtime_vars[key] = value

          deploy_cmd = [
              "gcloud",
              "run",
              "deploy",
              os.environ["SERVICE_NAME"],
              "--image",
              os.environ["IMAGE"],
              "--region",
              os.environ["REGION"],
              "--allow-unauthenticated",
              "--set-env-vars=" + ",".join(
                  f"{key}={value}" for key, value in runtime_vars.items()
              ),
          ]
          subprocess.run(deploy_cmd, check=True)

          service = json.loads(
              subprocess.check_output(
                  [
                      "gcloud",
                      "run",
                      "services",
                      "describe",
                      os.environ["SERVICE_NAME"],
                      "--region",
                      os.environ["REGION"],
                      "--format=json",
                  ],
                  text=True,
              )
          )
          spec = service.get("spec", {})
          template = spec.get("template", {})
          template_spec = template.get("spec", {})
          containers = template_spec.get("containers", [])
          env_items = containers[0].get("env", []) if containers else []
          env_names = {item.get("name") for item in env_items if item.get("name")}

          required_keys = {
              "NEXT_PUBLIC_APP_URL",
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY",
              "CLERK_SECRET_KEY",
              "NEXT_PUBLIC_SUPABASE_URL",
              "NEXT_PUBLIC_SUPABASE_ANON_KEY",
              "SUPABASE_SERVICE_ROLE_KEY",
              "GMAIL_USER",
              "GMAIL_APP_PASSWORD",
          }
          missing = sorted(required_keys - env_names)

          if missing:
              print(
                  "::error::Cloud Run revision is missing runtime env vars: "
                  + ", ".join(missing)
              )
              sys.exit(1)
          PY
